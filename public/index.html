/* RFC-4180-ish CSV parser: handles quoted fields, embedded commas and "" escapes. */
function parseCSV(text) {
  const rows = []; let row = [], field = "", i = 0, inQ = false;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ",") { row.push(field); field = ""; i++; continue; }
    if (c === "\r") { i++; continue; }
    if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
    field += c; i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// Build the immutable catalog: id -> {id, name, cost, unit}
const CATALOG = (function () {
  const rows = parseCSV(PRICING_CSV);
  const header = rows.shift().map(h => h.trim());
  const idx = { id: header.indexOf("id"), name: header.indexOf("name"), cost: header.indexOf("cost"), unit: header.indexOf("unit") };
  const map = {};
  for (const r of rows) {
    if (!r[idx.id]) continue;
    const id = r[idx.id].trim();
    map[id] = { id, name: r[idx.name], cost: parseFloat(r[idx.cost]), unit: r[idx.unit] };
  }
  return map;
})();

/* Group templates. Item→group mapping per the approved DATA_MODEL.md.
   "general" is the additive 20th group (DECISION 1); the 19 brief groups

   (DECISION 4). A catalog item may appear in more than one group template
   (e.g. bifold door in both Doors and Closet) — selection state is stored
   per room-instance + group, so there is no collision. */
const GROUPS = {

  flooring:   { label: "Flooring",            items: ["ig-01","ig-02","ig-03","ig-04","ig-05","ig-06"] },

  hvac:       { label: "HVAC",                items: ["as-01","as-02","as-03","as-04","as-05","as-06","as-07","as-08","as-09"] },

  fence:      { label: "Fence",               items: ["ex-01","ex-02","ex-03"] },

/* Room types: which groups each scope exposes. Singletons are house-wide and
   cannot be duplicated; the rest are addable/removable instances. Bedroom and
   Living reuse the shared Flooring/Paint/Doors group templates but, because
   state is keyed per instance, their selections are fully decoupled. */
const ROOM_TYPES = {
  interior: { label: "Interior / General",  singleton: true,  icon: "🏠", groups: ["flooring","paint","doors","pest","general"] },
  systems:  { label: "Systems & Structure", singleton: true,  icon: "⚙️", groups: ["hvac","electrical","structural","insulation"] },
  exterior: { label: "Exterior",            singleton: true,  icon: "🌳", groups: ["fence","siding","windows","garage","trees"] },
  kitchen:  { label: "Kitchen",             singleton: false, icon: "🍳", groups: ["cabinets","counters","appliances"] },
  bathroom: { label: "Bathroom",            singleton: false, icon: "🛁", groups: ["vanity","tubshower","tile"] },
  bedroom:  { label: "Bedroom",             singleton: false, icon: "🛏️", groups: ["flooring","paint","doors","closet"] },
  living:   { label: "Living / Common",     singleton: false, icon: "🛋️", groups: ["flooring","paint","doors","lighting"] },
};
const ADDABLE_TYPES = ["bathroom","bedroom","kitchen","living"];
const SEED_ORDER = ["interior","systems","exterior","kitchen","bathroom"];


/* ============================================================
   MODULE: PERSISTENCE — structured data in localStorage, guarded.
   Photo BLOBS never live here (see PHOTOS / IndexedDB). Only photo
   metadata is persisted in the project object.
   ============================================================ */

const LS_KEY = "spark.estimator.v1";

const Store = {
  load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      console.warn("Store.load failed, starting fresh:", e);
      return null;
    }
  },
  save(state) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      return true;
    } catch (e) {
      // Most likely QuotaExceededError. Structured data is small; the usual
      // cause would be a regression putting blobs here — surface it loudly.
      console.error("Store.save failed:", e);
      toast("⚠️ Could not save — storage error. Your last change may not persist.");
      return false;
    }
  },
};


/* ============================================================
   MODULE: PHOTOS — blobs in IndexedDB (never localStorage).
   localStorage holds only metadata (id, name, label, time) inside the
   project; the actual image Blob is stored here keyed by photo id.
   ============================================================ */

const Photos = (function () {
  const DB_NAME = "spark-photos";
  const STORE = "photos";
  let dbp = null;

  function open() {
    if (dbp) return dbp;
    dbp = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbp;
  }
  function tx(mode) { return open().then(db => db.transaction(STORE, mode).objectStore(STORE)); }

  return {
    async put(id, blob, projectId) {
      const os = await tx("readwrite");
      return new Promise((res, rej) => {
        const r = os.put({ id, blob, projectId });
        r.onsuccess = () => res(); r.onerror = () => rej(r.error);
      });
    },
    async get(id) {
      const os = await tx("readonly");
      return new Promise((res, rej) => {
        const r = os.get(id);
        r.onsuccess = () => res(r.result ? r.result.blob : null); r.onerror = () => rej(r.error);
      });
    },
    async del(id) {
      const os = await tx("readwrite");
      return new Promise((res, rej) => {
        const r = os.delete(id);
        r.onsuccess = () => res(); r.onerror = () => rej(r.error);
      });
    },
  };
})();


/* ============================================================
   MODULE: MODEL — application state + mutations.
   ============================================================ */

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2));

let STATE = null; // { projects:{}, order:[], activeId, global:{overrides}, settings:{maoRulePct} }

function defaultState() {
  return { projects: {}, order: [], activeId: null, global: { overrides: {} }, settings: { maoRulePct: 70 }, version: 1 };
}

function makeRoom(type, label) {
  return { instanceId: uid(), type, label, groups: {} };
}

function instanceLabel(project, type) {
  if (ROOM_TYPES[type].singleton) return ROOM_TYPES[type].label;
  const n = project.rooms.filter(r => r.type === type).length + 1;
  return ROOM_TYPES[type].label + " " + n;
}

function newProject(name) {
  const p = {
    id: uid(),
    name: name || "Untitled Property",
    createdAt: Date.now(),
    rooms: [],
    priceOverrides: {},   // per-project: itemId -> cost
    customItems: {},      // itemId -> {name, unit, cost, groupId}
    removed: [],          // itemIds hidden in this project
    photos: [],           // metadata only: {id, name, label, createdAt}
    notes: "",
    deal: { arv: "", rulePct: STATE ? STATE.settings.maoRulePct : 70, purchase: "" },
  };
  for (const t of SEED_ORDER) p.rooms.push(makeRoom(t, ROOM_TYPES[t].label));
  // give seeded addable rooms numbered labels
  p.rooms.forEach(r => { if (!ROOM_TYPES[r.type].singleton) r.label = instanceLabel({ rooms: p.rooms.filter(x => x !== r) }, r.type); });
  return p;
}

const activeProject = () => STATE.projects[STATE.activeId];
const getRoom = id => activeProject().rooms.find(r => r.instanceId === id);

function ensureGS(room, gid) {
  if (!room.groups[gid]) room.groups[gid] = { noAction: false, lines: {} };
  return room.groups[gid];
}
function ensureLine(gs, itemId) {
  if (!gs.lines[itemId]) gs.lines[itemId] = { checked: false, qty: 1 };
  return gs.lines[itemId];
}

// metadata for any item (catalog or per-project custom)
function itemMeta(itemId, project) {
  return CATALOG[itemId] || (project.customItems[itemId]
    ? { id: itemId, name: project.customItems[itemId].name, unit: project.customItems[itemId].unit, cost: project.customItems[itemId].cost }
    : { id: itemId, name: itemId, unit: "", cost: 0 });
}
// price precedence: per-project override -> global override -> CSV/base default
function resolvedCost(itemId, project) {
  if (project.priceOverrides[itemId] != null) return project.priceOverrides[itemId];
  if (STATE.global.overrides[itemId] != null) return STATE.global.overrides[itemId];
  return itemMeta(itemId, project).cost;
}
function isOverridden(itemId, project) {
  return project.priceOverrides[itemId] != null || STATE.global.overrides[itemId] != null;
}
// items visible in a group for this project: built-ins (minus removed) + custom for that group
function itemsForGroup(gid, project) {
  const out = [];
  for (const id of GROUPS[gid].items) if (!project.removed.includes(id)) out.push(id);
  for (const id in project.customItems) if (project.customItems[id].groupId === gid && !project.removed.includes(id)) out.push(id);
  return out;
}
function removedInGroup(gid, project) {
  const out = [];
  for (const id of GROUPS[gid].items) if (project.removed.includes(id)) out.push(id);
  for (const id in project.customItems) if (project.customItems[id].groupId === gid && project.removed.includes(id)) out.push(id);
  return out;
}


/* ============================================================
   MODULE: COMPUTE — totals & progress (single source for screen + export).
   ============================================================ */

function calc(project) {
  let grand = 0, totalGroups = 0, doneGroups = 0;
  const lineTotal = {}, roomSub = {}, groupDone = {};
  for (const room of project.rooms) {
    let rsub = 0;
    for (const gid of ROOM_TYPES[room.type].groups) {
      totalGroups++;
      const gs = room.groups[gid];
      let any = false;
      for (const itemId of itemsForGroup(gid, project)) {
        const ls = gs && gs.lines[itemId];
        let lt = 0;
        if (ls && ls.checked) { any = true; lt = resolvedCost(itemId, project) * (Number(ls.qty) || 0); }
        lineTotal[room.instanceId + "|" + gid + "|" + itemId] = lt;
        rsub += lt; grand += lt;
      }
      const complete = (gs && gs.noAction) || any;
      groupDone[room.instanceId + "|" + gid] = complete;
      if (complete) doneGroups++;
    }
    roomSub[room.instanceId] = rsub;
  }
  return { grand, totalGroups, doneGroups, lineTotal, roomSub, groupDone };
}


/* ============================================================
   MODULE: RENDER — build the checklist DOM. Structural changes do a full
   render; value changes (qty/check) patch only the affected numbers so
   typing never causes a re-render or focus loss.
   ============================================================ */

const $ = sel => document.querySelector(sel);
const main = document.getElementById("main");
const ui = { openRooms: new Set(), openGroups: new Set() }; // ephemeral expand state

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function money(n) {
  return "$" + (Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render() {
  const p = activeProject();
  if (!p) { main.innerHTML = ""; return; }
  const parts = [];

  // --- Photos card ---
  parts.push(photosCardHTML(p));

  // --- Notes card ---
  parts.push(`
    <details class="mb-3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <summary class="px-4 py-3 font-semibold text-slate-700 cursor-pointer select-none">📝 Property Notes</summary>
      <div class="px-4 pb-4">

          class="w-full rounded-xl border border-slate-300 p-3 text-sm">${esc(p.notes || "")}</textarea>
      </div>
    </details>`);

  // --- Rooms ---
  for (const room of p.rooms) parts.push(roomHTML(room, p));

  // --- Add room controls ---
  parts.push(`
    <div class="mt-4 mb-2">
      <div class="text-xs uppercase tracking-wide text-slate-500 mb-2 px-1">Add a room</div>
      <div class="grid grid-cols-2 gap-2">

          <button data-act="addRoom" data-type="${t}"

  parts.push(`
    <div class="mt-6 mb-2 flex justify-center">
      <button data-act="resetProject"

        Reset Property
      </button>

  main.innerHTML = parts.join("");
  refreshTotals();
  renderPhotoThumbs(p);
}

function roomHTML(room, p) {
  const rt = ROOM_TYPES[room.type];
  const open = ui.openRooms.has(room.instanceId);
  const groups = rt.groups.map(gid => groupHTML(room, gid, p)).join("");
  return `
  <section class="mb-3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="flex items-center gap-2 px-3 py-3 cursor-pointer no-tap" data-act="toggleRoom" data-i="${room.instanceId}">
      <span class="caret ${open ? "open" : ""} text-slate-400 shrink-0">▶</span>
      <span class="text-xl shrink-0">${rt.icon}</span>

      <span id="rs_${room.instanceId}" class="shrink-0 text-sm font-semibold text-slate-500">$0.00</span>
      ${rt.singleton ? "" : `
      <button data-act="renameRoom" data-i="${room.instanceId}" class="no-tap shrink-0 px-3 h-9 rounded-lg text-xs font-semibold text-slate-700 bg-slate-100 active:bg-slate-200" aria-label="Edit room name">Edit</button>
      <button data-act="removeRoom" data-i="${room.instanceId}" class="no-tap shrink-0 px-3 h-9 rounded-lg text-xs font-semibold text-rose-600 bg-rose-50 active:bg-rose-100" aria-label="Remove room">Remove</button>`}
    </div>
    <div id="rbody_${room.instanceId}" class="px-3 pb-3 space-y-2" ${open ? "" : "hidden"}>
      ${groups}
    </div>

}

function groupHTML(room, gid, p) {
  const g = GROUPS[gid];
  const gkey = room.instanceId + "|" + gid;
  const open = ui.openGroups.has(gkey);
  const gs = room.groups[gid] || { noAction: false, lines: {} };
  const items = itemsForGroup(gid, p);
  const rows = items.map(id => lineHTML(room, gid, id, p, gs)).join("");
  const removed = removedInGroup(gid, p);

  return `
  <div class="rounded-xl border border-slate-200 overflow-hidden">
    <div class="flex items-center gap-2 px-3 py-2.5 bg-slate-50 cursor-pointer no-tap" data-act="toggleGroup" data-i="${room.instanceId}" data-g="${gid}">
      <span class="caret ${open ? "open" : ""} text-slate-400 text-xs">▶</span>
      <span class="font-medium text-slate-700 text-sm">${esc(g.label)}</span>
      <span id="gb_${gkey}" class="ml-auto text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-200 text-slate-500">—</span>
    </div>
    <div id="gbody_${gkey}" ${open ? "" : "hidden"}>
      <label class="flex items-center gap-2 px-3 py-2 border-t border-slate-100 text-sm text-slate-600 no-tap">
        <input type="checkbox" data-act="noAction" data-i="${room.instanceId}" data-g="${gid}" ${gs.noAction ? "checked" : ""}
          class="w-5 h-5 rounded accent-emerald-600" />
        <span>No Action Needed</span>
      </label>
      <div class="${gs.noAction ? "opacity-40 pointer-events-none" : ""}">
        ${rows}
      </div>
      <div class="flex items-center gap-3 px-3 py-2 border-t border-slate-100">
        <button data-act="addItem" data-i="${room.instanceId}" data-g="${gid}" class="no-tap text-sm font-medium text-brand active:text-brand-dark">+ Add item</button>
        ${removed.length ? `<button data-act="restoreGroup" data-i="${room.instanceId}" data-g="${gid}" class="no-tap text-xs text-slate-400 ml-auto">Restore removed (${removed.length})</button>` : ""}
      </div>
    </div>
  </div>`;
}

function lineHTML(room, gid, itemId, p, gs) {
  const m = itemMeta(itemId, p);
  const ls = gs.lines[itemId] || { checked: false, qty: 1 };
  const cost = resolvedCost(itemId, p);
  const k = room.instanceId + "|" + gid + "|" + itemId;
  const over = isOverridden(itemId, p);
  // Row layout: the name+unit take the flexible left column (min-w-0 so they
  // wrap WITHIN their column and never slide under the controls); qty / cost /
  // line total / Remove sit in a fixed-width, shrink-0 cluster so they stay
  // aligned in their columns across every row, even at ~360px width.
  return `
  <div class="flex items-start gap-2 px-3 py-2 border-t border-slate-100">
    <input type="checkbox" data-act="check" data-i="${room.instanceId}" data-g="${gid}" data-it="${itemId}"
      id="ck_${k}" ${ls.checked ? "checked" : ""} class="w-5 h-5 mt-1 rounded accent-brand shrink-0" />
    <div class="min-w-0 flex-1">
      <div class="text-sm text-slate-800 leading-snug break-words">${esc(m.name)}</div>
      <div class="text-[11px] text-slate-400">per ${esc(m.unit || "ea.")}</div>
    </div>
    <div class="shrink-0 flex items-center gap-1.5">
      <input type="number" inputmode="decimal" min="0" step="any" data-act="qty" data-i="${room.instanceId}" data-g="${gid}" data-it="${itemId}"
        value="${ls.qty}" class="w-12 text-center rounded-lg border border-slate-300 py-1.5" aria-label="Quantity" />
      <button data-act="cost" data-it="${itemId}" class="no-tap w-14 text-right text-xs ${over ? "text-brand font-semibold" : "text-slate-500"}" aria-label="Edit unit cost">
        ${money(cost)}${over ? " *" : ""}
      </button>
      <span id="lt_${k}" class="w-16 text-right text-xs font-semibold text-slate-800">$0.00</span>
      <button data-act="removeItem" data-it="${itemId}" class="no-tap px-2 h-8 rounded-lg text-xs font-semibold text-rose-600 active:bg-rose-50" aria-label="Remove item">Remove</button>
    </div>
  </div>`;
}

// Patch all numeric displays from a fresh calc() — cheap, runs on value changes.
function refreshTotals() {
  const p = activeProject(); if (!p) return;
  const c = calc(p);
  const gt = document.getElementById("grandTotal"); if (gt) gt.textContent = money(c.grand);
  const pct = c.totalGroups ? Math.round((c.doneGroups / c.totalGroups) * 100) : 0;
  const bar = document.getElementById("progBar"); if (bar) bar.style.width = pct + "%";
  const pt = document.getElementById("progText"); if (pt) pt.textContent = c.doneGroups + " / " + c.totalGroups + " groups reviewed";
  const pp = document.getElementById("progPct"); if (pp) pp.textContent = pct + "%";
  for (const k in c.lineTotal) { const el = document.getElementById("lt_" + k); if (el) el.textContent = money(c.lineTotal[k]); }
  for (const id in c.roomSub) { const el = document.getElementById("rs_" + id); if (el) el.textContent = money(c.roomSub[id]); }
  for (const k in c.groupDone) {
    const el = document.getElementById("gb_" + k);
    if (el) {
      const done = c.groupDone[k];
      el.textContent = done ? "✓ done" : "—";
      el.className = "ml-auto text-[11px] font-semibold px-2 py-0.5 rounded-full " + (done ? "bg-emerald-100 text-emerald-700" : "bg-slate-200 text-slate-500");
    }
  }
}

function save() { Store.save(STATE); }


/* ============================================================
   MODULE: HANDLERS — event delegation on #main.
   ============================================================ */

main.addEventListener("input", e => {
  const t = e.target;
  if (t.dataset.act === "qty") {
    const room = getRoom(t.dataset.i), gs = ensureGS(room, t.dataset.g), ls = ensureLine(gs, t.dataset.it);
    let v = parseFloat(t.value); if (isNaN(v) || v < 0) v = 0;
    ls.qty = v; ls.checked = v > 0;
    const ck = document.getElementById("ck_" + t.dataset.i + "|" + t.dataset.g + "|" + t.dataset.it);
    if (ck) ck.checked = ls.checked;
    if (ls.checked && gs.noAction) { gs.noAction = false; render(); }
    refreshTotals(); save();
  } else if (t.id === "notesArea") {
    activeProject().notes = t.value; saveDebounced();
  }
});

main.addEventListener("change", e => {
  const t = e.target;
  if (t.dataset.act === "check") {
    const room = getRoom(t.dataset.i), gs = ensureGS(room, t.dataset.g), ls = ensureLine(gs, t.dataset.it);
    ls.checked = t.checked;
    if (ls.checked && (!ls.qty || ls.qty <= 0)) ls.qty = 1;
    if (ls.checked && gs.noAction) { gs.noAction = false; render(); }
    else refreshTotals();
    save();
  } else if (t.dataset.act === "noAction") {
    const room = getRoom(t.dataset.i), gs = ensureGS(room, t.dataset.g);
    gs.noAction = t.checked;
    if (gs.noAction) for (const id in gs.lines) gs.lines[id].checked = false; // "no work" clears selections
    render(); save();
  }
});

main.addEventListener("click", e => {
  const btn = e.target.closest("[data-act]"); if (!btn) return;
  const act = btn.dataset.act;

  if (act === "toggleRoom") {
    const id = btn.dataset.i, body = document.getElementById("rbody_" + id);
    const o = ui.openRooms.has(id); o ? ui.openRooms.delete(id) : ui.openRooms.add(id);
    if (body) body.hidden = o; btn.querySelector(".caret").classList.toggle("open", !o);
  } else if (act === "toggleGroup") {
    const k = btn.dataset.i + "|" + btn.dataset.g, body = document.getElementById("gbody_" + k);
    const o = ui.openGroups.has(k); o ? ui.openGroups.delete(k) : ui.openGroups.add(k);
    if (body) body.hidden = o; btn.querySelector(".caret").classList.toggle("open", !o);
  } else if (act === "addRoom") {
    const type = btn.dataset.type, p = activeProject();
    const room = makeRoom(type, ""); room.label = instanceLabel(p, type);
    p.rooms.push(room); ui.openRooms.add(room.instanceId); render(); save();
    document.getElementById("rbody_" + room.instanceId)?.scrollIntoView({ behavior: "smooth", block: "center" });
  } else if (act === "renameRoom") {
    renameRoom(btn.dataset.i);
  } else if (act === "removeRoom") {
    const id = btn.dataset.i, p = activeProject(), room = getRoom(id);
    confirmModal(`Remove ${room.label}? Its selections will be deleted.`, () => {
      p.rooms = p.rooms.filter(r => r.instanceId !== id); render(); save();
    });
  } else if (act === "cost") {
    openCostModal(btn.dataset.it);
  } else if (act === "removeItem") {
    const p = activeProject(); if (!p.removed.includes(btn.dataset.it)) p.removed.push(btn.dataset.it);
    render(); save();
  } else if (act === "restoreGroup") {
    const p = activeProject(), ids = removedInGroup(btn.dataset.g, p);
    p.removed = p.removed.filter(x => !ids.includes(x)); render(); save();
  } else if (act === "addItem") {
    openAddItemModal(btn.dataset.i, btn.dataset.g);
  } else if (act === "resetProject") {
    confirmModal("Reset this property? This clears all selections and photos and can't be undone.", () => { resetCurrentProject(); });
  }
});

// Clear the CURRENT project to empty: removes all selections, quantities, notes,
// per-project price overrides, custom items, and photos (blobs deleted from
// IndexedDB too). Keeps the project and its rooms; never touches other projects.
async function resetCurrentProject() {
  const p = activeProject(); if (!p) return;
  for (const ph of p.photos) { try { await Photos.del(ph.id); } catch (e) {} }
  p.photos = [];
  p.notes = "";
  p.priceOverrides = {};
  p.customItems = {};
  p.removed = [];
  p.deal = { arv: "", rulePct: STATE.settings.maoRulePct, purchase: "" };
  for (const room of p.rooms) room.groups = {}; // wipes checks, quantities, no-action
  save(); render();
  toast("Property reset.");
}

let _saveT = null;
function saveDebounced() { clearTimeout(_saveT); _saveT = setTimeout(save, 400); }


/* ============================================================
   MODULE: SHEETS — overlays (projects, menu, price schedule, modals).
   ============================================================ */

const sheetRoot = document.getElementById("sheetRoot");

// Background-scroll lock for open sheets. iOS Safari ignores body{overflow:hidden},
// so we pin the body with position:fixed and restore the scroll position on close.
let _locked = false, _scrollY = 0;
function lockScroll() {
  if (_locked) return;
  _scrollY = window.scrollY || window.pageYOffset || 0;
  const b = document.body.style;
  b.position = "fixed"; b.top = `-${_scrollY}px`; b.left = "0"; b.right = "0"; b.width = "100%"; b.overflow = "hidden";
  _locked = true;
}
function unlockScroll() {
  if (!_locked) return;
  const b = document.body.style;
  b.position = ""; b.top = ""; b.left = ""; b.right = ""; b.width = ""; b.overflow = "";
  _locked = false;
  window.scrollTo(0, _scrollY);
}
function closeSheet() { sheetRoot.innerHTML = ""; unlockScroll(); }
function overlay(inner, opts = {}) {
  lockScroll();
  sheetRoot.innerHTML = `
    <div class="fixed inset-0 z-40 bg-black/40 flex items-end sm:items-center justify-center" data-ov>
      <div class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[88vh] overflow-y-auto safe-bottom" data-card>
        ${inner}
      </div>
    </div>`;
  sheetRoot.querySelector("[data-ov]").addEventListener("click", e => { if (e.target.hasAttribute("data-ov")) closeSheet(); });
}
function sheetHeader(title) {
  return `<div class="sticky top-0 bg-white px-4 py-3 border-b border-slate-100 flex items-center">
    <h2 class="font-semibold text-lg">${esc(title)}</h2>
    <button class="ml-auto w-9 h-9 rounded-lg active:bg-slate-100 text-xl" data-close>✕</button></div>`;
}
sheetRoot.addEventListener("click", e => { if (e.target.closest("[data-close]")) closeSheet(); });

function toast(msg) {
  const d = document.createElement("div");
  d.className = "fixed left-1/2 -translate-x-1/2 bottom-24 z-50 bg-slate-900 text-white text-sm px-4 py-2 rounded-full shadow-lg";
  d.textContent = msg; document.body.appendChild(d);
  setTimeout(() => d.remove(), 2600);
}
function confirmModal(msg, onYes) {
  overlay(`<div class="p-5">
    <p class="text-slate-700 mb-5">${esc(msg)}</p>
    <div class="flex gap-2">
      <button class="flex-1 h-11 rounded-xl bg-slate-100 font-medium" data-close>Cancel</button>
      <button class="flex-1 h-11 rounded-xl bg-rose-600 text-white font-semibold" id="cfYes">Confirm</button>
    </div></div>`);
  $("#cfYes").addEventListener("click", () => { closeSheet(); onYes(); });
}

      <div id="dVerdict" class="text-sm"></div>

  function recompute() {
    const arv = parseFloat($("#dArv").value) || 0;
    const rule = parseFloat($("#dRule").value); const r = isNaN(rule) ? 70 : rule;
    const buy = parseFloat($("#dBuy").value);

    // persist
    p.deal = { arv: $("#dArv").value, rulePct: $("#dRule").value, purchase: $("#dBuy").value };
    saveDebounced();
  }
  fields.forEach(f => f.addEventListener("input", recompute));

/* ============================================================
   MODULE: EXPORT — ZIP (xlsx breakdown + photos). Offline-capable
   because the SW caches xlsx-js-style and JSZip.
   ============================================================ */

async function doExport() {
  const p = activeProject();
  if (typeof XLSX === "undefined" || typeof JSZip === "undefined") {
    toast("Export libraries still loading — try again in a moment."); return;
  }
  toast("Building ZIP…");
  try {
    const wbout = await buildWorkbook(p);
    const zip = new JSZip();
    zip.file(safeName(p.name) + "_estimate.xlsx", wbout);
    if (p.photos.length) {
      const folder = zip.folder("photos");
      let n = 1;
      for (const ph of p.photos) {
        try { const blob = await Photos.get(ph.id); if (blob) folder.file(String(n).padStart(2, "0") + "_" + safeName(ph.name || "photo") , blob); n++; }
        catch (e) { /* skip a bad blob, keep exporting */ }
      }
    }
    const blob = await zip.generateAsync({ type: "blob" });
    triggerDownload(blob, safeName(p.name) + "_estimate.zip");
    toast("✓ ZIP downloaded");
  } catch (e) {
    console.error(e); toast("⚠️ Export failed: " + e.message);
  }
}

/* Two-sheet branded workbook. Sheet 1 "Dashboard": title/subtitle bands, four KPI
   cards, a verdict banner, and a cell-based horizontal bar chart of cost by scope.
   Sheet 2 "Line Items": grouped detail with per-group subtotals + a frozen header.
   All styling is applied via xlsx-js-style cell .s objects on a uniform 24-col grid
   composed with merges. Every total comes from the same resolvedCost() the UI uses.
   Built on a uniform narrow column grid composed with merged cells. */
async function buildWorkbook(p) {
  const ARIAL = "Arial";
  const C = { orange:"C8512A", slate:"1F2A37", card:"F8FAFC", track:"EFE3DC",
              green:"15803D", greenBg:"DCFCE7", red:"B91C1C", redBg:"FEE2E2",
              grey:"64748B", line:"E2E8F0", white:"FFFFFF", meta:"475569", shade:"F1F5F9" };
  const ENC = (r,c)=>XLSX.utils.encode_cell({r,c});
  const calcRes = calc(p);
  const repairs = calcRes.grand;
  const arv = parseFloat(p.deal && p.deal.arv) || 0;
  let rule = parseFloat(p.deal && p.deal.rulePct); if (isNaN(rule)) rule = 70;
  const mao = arv * (rule / 100) - repairs;
  const margin = arv - mao - repairs; // built-in margin at the max offer

  function mk(){ return { "!merges":[], _maxR:0, _maxC:0 }; }
  function put(ws,r,c,v,s,z){
    const ref=ENC(r,c), isNum=typeof v==="number";
    ws[ref]={ t:isNum?"n":"s", v:(v===undefined||v===null)?"":v };
    if(s)ws[ref].s=s; if(z)ws[ref].z=z;
    if(r>ws._maxR)ws._maxR=r; if(c>ws._maxC)ws._maxC=c;
  }
  function box(ws,r0,c0,r1,c1,s,z){
    for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
      const ref=ENC(r,c); if(!ws[ref])ws[ref]={t:"s",v:""};
      ws[ref].s=s; if(z)ws[ref].z=z;
      if(r>ws._maxR)ws._maxR=r; if(c>ws._maxC)ws._maxC=c;
    }
  }
  function mergeC(ws,r0,c0,r1,c1){ ws["!merges"].push({s:{r:r0,c:c0},e:{r:r1,c:c1}}); }
  function band(ws,r0,c0,r1,c1,v,s,z){ box(ws,r0,c0,r1,c1,s,z); if(r1>r0||c1>c0)mergeC(ws,r0,c0,r1,c1); put(ws,r0,c0,v,s,z); }
  function borderRect(ws,r0,c0,r1,c1,color){
    const bd={style:"thin",color:{rgb:color}};
    for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
      const ref=ENC(r,c); if(!ws[ref])ws[ref]={t:"s",v:""};
      const s=Object.assign({},ws[ref].s), b=Object.assign({},s.border);
      if(r===r0)b.top=bd; if(r===r1)b.bottom=bd; if(c===c0)b.left=bd; if(c===c1)b.right=bd;
      s.border=b; ws[ref].s=s;
    }
  }
  function finalize(ws){ ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:ws._maxR,c:ws._maxC}}); delete ws._maxR; delete ws._maxC; return ws; }
  const font=(o)=>Object.assign({name:ARIAL},o);
  const center={horizontal:"center",vertical:"center"};
  const leftMid={horizontal:"left",vertical:"center"};
  const rightMid={horizontal:"right",vertical:"center"};
  const leftIndent={horizontal:"left",vertical:"center",indent:1};

  // ===================== SHEET 1: DASHBOARD =====================
  const d = mk(); const NC=24, lastCol=NC-1; d["!cols"]=Array.from({length:NC},()=>({wch:3.4}));
  const rows=[]; const setH=(r,h)=>{rows[r]={hpt:h};}; let R=0;
  band(d,R,0,R,lastCol,"  SPARK HOMES",{font:font({sz:20,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.slate}},alignment:leftMid}); setH(R,30); R++;
  band(d,R,0,R,lastCol,"  REPAIR ESTIMATE · Property Cost Dashboard",{font:font({sz:11,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.orange}},alignment:leftMid}); setH(R,20); R++;
  band(d,R,0,R,lastCol,"  Property: "+(p.name||"—")+"        Date: "+new Date().toLocaleDateString(),{font:font({sz:9,color:{rgb:C.meta}}),alignment:leftMid}); setH(R,16); R++;
  R++;
  const cardCols=[[0,4],[6,10],[12,16],[18,22]];
  const marginAccent = margin>0 ? C.green : C.red;
  const kpis=[
    {label:"TOTAL REPAIRS", val:repairs, accent:C.orange},
    {label:"AFTER-REPAIR VALUE", val:arv, accent:C.slate},
    {label:"MAX OFFER ("+rule+"%)", val:mao, accent:C.orange},
    {label:"PROJECTED MARGIN", val:margin, accent:marginAccent},
  ];
  const SR=R; setH(SR,5); setH(SR+1,14); setH(SR+2,16); setH(SR+3,16);
  kpis.forEach((k,i)=>{
    const cc=cardCols[i], c0=cc[0], c1=cc[1];
    band(d,SR,c0,SR,c1,"",{fill:{fgColor:{rgb:k.accent}}});
    band(d,SR+1,c0,SR+1,c1,"  "+k.label,{font:font({sz:8,bold:true,color:{rgb:C.grey}}),fill:{fgColor:{rgb:C.card}},alignment:leftMid});
    band(d,SR+2,c0,SR+3,c1,k.val,{font:font({sz:16,bold:true,color:{rgb:C.slate}}),fill:{fgColor:{rgb:C.card}},alignment:leftIndent},'"$"#,##0');
    borderRect(d,SR,c0,SR+3,c1,C.line);
  });
  R=SR+4; R++;
  const go = margin>0;
  band(d,R,0,R,lastCol, go?"✓ GO — MARGIN PRESENT AT MAX OFFER":"⚠ REVIEW — NO MARGIN AT MAX OFFER",
    {font:font({sz:12,bold:true,color:{rgb:go?C.green:C.red}}),fill:{fgColor:{rgb:go?C.greenBg:C.redBg}},alignment:center}); setH(R,22); R++; R++;
  band(d,R,0,R,lastCol,"  COST BY SECTION / ROOM",{font:font({sz:11,bold:true,color:{rgb:C.slate}}),alignment:leftMid}); setH(R,18); R++;
  const scopes = p.rooms.map(rm=>({label:rm.label, val:calcRes.roomSub[rm.instanceId]||0})).filter(s=>s.val>0).sort((a,b)=>b.val-a.val);
  const maxVal = scopes.length?scopes[0].val:0;
  const barC0=12, barCells=lastCol-barC0+1;

    band(d,R,0,R,lastCol,"  No costs entered yet.",{font:font({sz:10,italic:true,color:{rgb:C.grey}}),alignment:leftMid}); setH(R,16); R++;
  } else {

      band(d,R,8,R,11,s.val,{font:font({sz:10,bold:true,color:{rgb:C.slate}}),alignment:rightMid},'"$"#,##0');
      const fillN=Math.max(1,Math.ceil(s.val/maxVal*barCells));
      for(let i=0;i<barCells;i++) put(d,R,barC0+i,"",{fill:{fgColor:{rgb: i<fillN?C.orange:C.track}}});

    });

    band(d,R,8,R,11,repairs,{font:font({sz:10,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.orange}},alignment:rightMid},'"$"#,##0');
    for(let i=0;i<barCells;i++) put(d,R,barC0+i,"",{fill:{fgColor:{rgb:C.orange}}});
    setH(R,16); R++;
  }
  d["!rows"]=rows;

  // ===================== SHEET 2: LINE ITEMS =====================
  const li = mk(); li["!cols"]=[{wch:22},{wch:20},{wch:42},{wch:12},{wch:8},{wch:13},{wch:14}];
  const LCOL=6; const liRows=[]; let r2=0;
  band(li,r2,0,r2,LCOL,"SPARK HOMES — Repair Estimate · Line Items",{font:font({sz:14,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.slate}},alignment:leftMid}); liRows[r2]={hpt:24}; r2++;
  band(li,r2,0,r2,LCOL,"Property: "+(p.name||"—")+"        Date: "+new Date().toLocaleDateString(),{font:font({sz:9,color:{rgb:C.meta}}),alignment:leftMid}); r2++;
  r2++;
  const headerRow=r2;
  const heads=["Section / Room","Group","Item","Unit","Qty","Unit Cost","Line Total"];
  heads.forEach((h,i)=>put(li,headerRow,i,h,{font:font({sz:10,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.slate}},alignment:(i===4?center:(i>=5?rightMid:(i===3?center:leftMid))),border:{bottom:{style:"medium",color:{rgb:C.orange}}}}));
  liRows[headerRow]={hpt:18};
  r2=headerRow+1;
  const moneyZ='"$"#,##0.00';
  const bf=font({sz:10,color:{rgb:C.slate}});
  const cellL={font:bf,alignment:leftMid}, cellC={font:bf,alignment:center}, cellR={font:bf,alignment:rightMid};
  let any=false;
  for(const room of p.rooms){
    for(const gid of ROOM_TYPES[room.type].groups){

      const ids=itemsForGroup(gid,p).filter(id=>gs.lines[id]&&gs.lines[id].checked);
      if(!ids.length) continue;
      any=true; let gsum=0;
      for(const itemId of ids){
        const m=itemMeta(itemId,p), cost=resolvedCost(itemId,p), qty=Number(gs.lines[itemId].qty)||0, lt=cost*qty; gsum+=lt;
        put(li,r2,0,room.label,cellL); put(li,r2,1,GROUPS[gid].label,cellL); put(li,r2,2,m.name,cellL);
        put(li,r2,3,m.unit,cellC); put(li,r2,4,qty,cellC); put(li,r2,5,cost,cellR,moneyZ); put(li,r2,6,lt,cellR,moneyZ);
        r2++;
      }
      const sR={font:font({sz:10,bold:true,color:{rgb:C.slate}}),fill:{fgColor:{rgb:C.shade}},alignment:rightMid};
      const sL=Object.assign({},sR,{alignment:leftMid});
      put(li,r2,0,"",sL); put(li,r2,1,"",sL);
      band(li,r2,2,r2,5,"Subtotal — "+room.label+" · "+GROUPS[gid].label,sL);
      put(li,r2,6,gsum,sR,moneyZ);
      r2++;
    }
  }
  if(!any){ band(li,r2,0,r2,LCOL,"No line items selected.",{font:font({sz:10,italic:true,color:{rgb:C.grey}}),alignment:leftMid}); r2++; }
  r2++;
  const gtS={font:font({sz:11,bold:true,color:{rgb:C.white}}),fill:{fgColor:{rgb:C.orange}},alignment:rightMid};
  const gtL=Object.assign({},gtS,{alignment:leftMid});
  put(li,r2,0,"",gtL); put(li,r2,1,"",gtL);
  band(li,r2,2,r2,5,"GRAND TOTAL",gtL);
  put(li,r2,6,calcRes.grand,gtS,moneyZ);
  liRows[r2]={hpt:20};
  li["!rows"]=liRows;
  li["!freeze"]={ xSplit:0, ySplit:headerRow+1, topLeftCell:ENC(headerRow+1,0), activePane:"bottomLeft", state:"frozen" };

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, finalize(d), "Dashboard");
  XLSX.utils.book_append_sheet(wb, finalize(li), "Line Items");
  const out = XLSX.write(wb,{bookType:"xlsx",type:"array"});
  // This xlsx-js-style build can't write freeze panes, so inject one into the
  // Line Items sheet (sheet2) via JSZip to keep the header row frozen.
  try {
    const zip = await JSZip.loadAsync(out);
    const path = "xl/worksheets/sheet2.xml", f = zip.file(path);
    if (f) {
      let xml = await f.async("string");
      const tl = ENC(headerRow+1, 0);
      const pane = '<pane ySplit="'+(headerRow+1)+'" topLeftCell="'+tl+'" activePane="bottomLeft" state="frozen"/>'
                 + '<selection pane="bottomLeft" activeCell="'+tl+'" sqref="'+tl+'"/>';
      xml = xml.replace(/<sheetView([^>]*?)\/>/, '<sheetView$1>'+pane+'</sheetView>');
      zip.file(path, xml);
      return await zip.generateAsync({ type:"array" });
    }
  } catch (e) { /* freeze is a nicety; fall back to the unfrozen workbook */ }
  return out;
}

function safeName(s) { return String(s).replace(/[^\w.\-]+/g, "_").slice(0, 60) || "estimate"; }
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 1500);
}

/* Normalize loaded state to the live-resolved pricing model and fill any
   missing fields. Prices are NEVER snapshotted into a project: a project keeps
   only sparse per-item overrides; the global store is shared; resolvedCost reads
   both live. A previously-deployed build snapshotted the whole price table into
   each project's priceOverrides at creation, which froze older projects against
   later global edits — this migration undoes that. */
function migrate(state) {
  if (!state || typeof state !== "object") return state;
  if (!state.global || typeof state.global !== "object") state.global = { overrides: {} };
  if (!state.global.overrides || typeof state.global.overrides !== "object") state.global.overrides = {};
  if (!state.settings) state.settings = { maoRulePct: 70 };
  const projects = state.projects || {};
  for (const id in projects) {
    const p = projects[id];
    if (!p.priceOverrides || typeof p.priceOverrides !== "object") p.priceOverrides = {};
    if (!p.customItems || typeof p.customItems !== "object") p.customItems = {};
    if (!Array.isArray(p.removed)) p.removed = [];
    if (!Array.isArray(p.photos)) p.photos = [];
    if (!Array.isArray(p.rooms)) p.rooms = [];
    if (typeof p.notes !== "string") p.notes = "";
    if (!p.deal || typeof p.deal !== "object") p.deal = { arv: "", rulePct: state.settings.maoRulePct, purchase: "" };
    // Drop any legacy full price-table snapshot fields.
    delete p.prices; delete p.priceTable; delete p.priceSnapshot;
    // De-snapshot priceOverrides: an entry equal to the CSV default isn't a real
    // override (drop it), and a near-catalog-sized map is a snapshot (clear it).
    // Both restore live resolution against the current global price.
    for (const itemId of Object.keys(p.priceOverrides)) {
      const def = CATALOG[itemId] ? CATALOG[itemId].cost : (p.customItems[itemId] ? p.customItems[itemId].cost : null);
      if (def != null && p.priceOverrides[itemId] === def) delete p.priceOverrides[itemId];
    }
    if (Object.keys(p.priceOverrides).length >= 30) p.priceOverrides = {};
  }
  return state;
}

function boot() {
  const loaded = migrate(Store.load());
  if (!loaded || !loaded.projects || !Object.keys(loaded.projects).length) {
    STATE = defaultState();
    const p = newProject("My First Property");
    STATE.projects[p.id] = p; STATE.order.push(p.id); STATE.activeId = p.id;
  } else {
    STATE = loaded;
  }
  save();
  if (!STATE.activeId || !STATE.projects[STATE.activeId]) STATE.activeId = STATE.order[0];
  // open the first room by default so the app doesn't look empty
  const ap = activeProject(); if (ap && ap.rooms[0]) ui.openRooms.add(ap.rooms[0].instanceId);
  syncProjectBtn();
  render();
}
boot();
